version: '3.8'

# =============================================================
# MACDA Connector Caddy 反向代理
# 包含服务：
#   - macda-caddy : Caddy 反向代理（HTTPS，443/80）
# 功能：
#   - 将 https://192.168.66.12 和 https://test.macda.org
#     反向代理到 nb67-web:8080
#   - 使用自签名证书（用户可在持久化目录中自行替换）
# 前置条件：
#   - nb67-web 容器已在 macdanet 网络中运行
#   - 运行 ./caddy/generate-certs.sh 生成初始证书
#   - ${DATA_DIR}/caddy/config/Caddyfile 已存在（由 install.sh 复制）
# =============================================================

services:

  macda-caddy:
    image: caddy:2-alpine
    container_name: macda-caddy
    hostname: macda-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Caddyfile：用户可在此路径自行修改
      - ${DATA_DIR}/caddy/config/Caddyfile:/etc/caddy/Caddyfile:ro
      # 证书目录：用户可替换 server.crt / server.key
      - ${DATA_DIR}/caddy/certs:/etc/caddy/certs:ro
      # Caddy 内部数据（OCSP 缓存等）
      - ${DATA_DIR}/caddy/data:/data
    networks:
      - macdanet

# ── 使用已存在的外部网络 ──────────────────────────────────────
networks:
  macdanet:
    external: true
    name: macdanet
    driver: bridge
