name: report

services:
  ground-reporter:
    image: harbor.naivehero.top:8443/macda2/ground-reporter:v2.5.0
    container_name: ground-reporter
    hostname: ground-reporter
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=redpanda-1:9092,redpanda-2:9092,redpanda-3:9092
      # 各协议章节上报接口（本地测试指向 mock-platform；联调时改为真实地址）
      - FAULT_RECORD_URL=http://mock-platform:8188/gate/METRO-PHM/api/faultRecordsSubsystem/saveRecord
      - SYS_STATUS_URL=http://mock-platform:8188/gate/METRO-SELFCHECK-SUBSYSTEM/api/faultRecordsSubsystem/saveStatus
      - LIFE_RECORD_URL=http://mock-platform:8188/gate/METRO-PHM/api/devices/status/train/saveOrUpdate
      - PLATFORM_API_KEY=
      - PLATFORM_TIMEOUT_SEC=10
      - PLATFORM_RETRY_MAX=3
      - PLATFORM_RETRY_BACKOFF_MS=1000
      # 空调子系统标识（固定）
      - SUBSYSTEM_CODE=5
      - TRAIN_TYPE=B
      # 心跳周期（分钟）与每日批量报送时刻（小时，0=凌晨）
      - HEARTBEAT_INTERVAL_MIN=10
      - DAILY_BATCH_HOUR=0
      - LOG_LEVEL=INFO
    depends_on:
      mock-platform:
        condition: service_healthy
    networks:
      - macdanet

  mock-platform:
    image: golang:1.24-alpine
    container_name: mock-platform
    hostname: mock-platform
    restart: unless-stopped
    working_dir: /app
    command: go run main.go -port 8188
    volumes:
      - /data/MACDA2/connect/tests/mock-platform:/app:ro
    ports:
      - "18188:8188"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8188/ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks:
      - macdanet

networks:
  macdanet:
    name: macdanet
    driver: bridge
    external: true
